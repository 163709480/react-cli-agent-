name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    name: typecheck + test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        # Windows 下某些 path 分隔符测试可能不稳;允许单个 OS 失败不阻塞
        # 其余矩阵。但只要 ubuntu+macos 任意一个 Node 20/22 通过就视为 OK
        run: npm test
        continue-on-error: ${{ matrix.os == 'windows-latest' }}
